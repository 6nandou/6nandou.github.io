<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>爱 › Gamepad Tester</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="../css/tools-style.css">
</head>
<style>
    /*=== GAMEPAD TESTER ===*/

.tester-layout p, 
.tester-layout h2, 
.tester-layout h3 {
    color: rgba(132, 95, 244, 0.75);
    font-style: normal;
}

.tester-layout p {
    margin-bottom: 20px;
}

.tester-layout h1, 
.tester-layout h3 {
    margin-bottom: 10px;
}

.tester-body-bg {
    background-color: #000000;
}

.cuadro-central.tester-blur {
    background-color: #0000004d;
    backdrop-filter: blur(15px);
    text-align: center;
    padding: 20px;
}

.tester-layout {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    width: 100%;
    padding: 20px;
}

.tester-container {
    display: none;
    grid-template-columns: 1fr 1fr;
    gap: 15px;
    width: 100%;
}

.data-panel {
    text-align: left;
}

.button-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 6px;
    margin-top: 10px;
}

.btn-stat {
    background-color: #ffffff0d;
    border: 1px solid rgba(132, 95, 244, 0.25);
    border-radius: 6px;
    padding: 4px;
    font-size: 10px;
    color: #ffffffb3;
}

.btn-stat.active {
    background-color: rgba(132, 95, 244, 0.75);
    color: #ffffff;
}

.visual-panel {
    display: flex;
    justify-content: center;
    align-items: center;
}

#gamepad-svg {
    width: 100%;
    max-width: 350px;
}

.svg-body {
    fill: #000000;
    stroke: rgba(132, 95, 244, 0.75);
    stroke-width: 2;
}

.svg-btn {
    fill: transparent;
    stroke: #ffffff;
    stroke-width: 1.5;
}

.svg-stick {
    fill: rgba(132, 95, 244, 0.15);
    stroke: rgba(132, 95, 244, 0.75);
    stroke-width: 2;
}

.svg-trigger-black {
    fill: #000000;
    stroke: #ffffff;
    stroke-width: 1.5;
}

.actions-row {
    grid-column: span 2;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 15px;
    margin-top: 15px;
}

.btn-action {
    background: transparent;
    color: rgba(132, 95, 244, 0.75);
    border: 2px solid rgba(132, 95, 244, 0.75);
    padding: 6px 12px;
    border-radius: 8px;
    cursor: pointer;
    font-family: 'Source Code Pro';
    font-weight: bold;
    transition: 0.3s;
}

.btn-action:hover {
    background: rgba(132, 95, 244, 0.75);
    color: #ffffff;
}

.toggle-container {
    font-family: 'Source Code Pro';
    display: flex;
    align-items: center;
    gap: 8px;
    color: rgba(132, 95, 244, 0.75);
    font-size: 0.7rem;
}

.switch {
    position: relative;
    width: 34px;
    height: 18px;
}

.switch input {
    opacity: 0;
    width: 0;
    height: 0;
}

.slider {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: #333333;
    border: 1px solid rgba(132, 95, 244, 0.75);
    border-radius: 18px;
    transition: .4s;
}

.slider:before {
    position: absolute;
    content: "";
    height: 12px;
    width: 12px;
    left: 2px;
    bottom: 2px;
    background: #ffffff;
    transition: .4s;
    border-radius: 50%;
}

input:checked + .slider {
    background: rgba(132, 95, 244, 0.75);
}

input:checked + .slider:before {
    transform: translateX(16px);
}

.tester-layout .btn-home {
    margin-top: 20px;
    color: rgba(132, 95, 244, 0.75);
    text-decoration: none;
    font-size: 0.9rem;
    display: inline-flex;
    align-items: center;
    gap: 5px;
    transition: all 0.3s ease;
}

.tester-layout .btn-home:hover {
    color: #ffffff;
    transform: translateX(-3px);
}

@media (max-width: 768px) {
    .tester-body-bg {
        background-position: top;
        background-size: auto;
    }

    .tester-layout h2 {
        font-size: 12px;
        margin-bottom: 6px;
    }

    .cuadro-central.tester-blur {
        width: 20rem;
        top: 35%;
    }

    .tester-container {
        grid-template-columns: 1fr;
        gap: 20px;
    }

    .actions-row {
        grid-column: span 1;
    }

    .button-grid {
        grid-template-columns: repeat(4, 1fr);
    }

    .btn-stat {
        font-size: 8px;
        padding: 2px;
    }
}

@media (max-width: 320px) {
    .cuadro-central.tester-blur {
        width: 18rem;
        top: 35%;
    }

    .tester-layout h1, 
    .tester-layout h2 {
        font-size: 10px;
    }

    .btn-stat {
        font-size: 7px;
    }
}
</style>
<body>
    <canvas id="tablero-fondo"></canvas>

<div class="cuadro-central">
    <div class="tester-layout">

        <header class="cabecera-principal">
            <h1>> Gamepad Tester</h1>
            <a href="../tools/tools.html" class="btn primary"><i class="bi bi-arrow-left"></i> Volver</a>
        </header>

        <p id="msg-init">Conecta un mando para comenzar</p>

        <div id="main-tester" class="tester-container">
            <div class="data-panel">
                <h3 id="gp-name">Cargando...</h3>
                <p style="font-size: 0.7rem; color: #a163e1;">Ejes: <span id="axes-txt">0,0,0,0</span></p>
                <div class="button-grid" id="btn-grid"></div>
            </div>

            <div class="visual-panel">
                <svg id="gamepad-svg" viewBox="0 0 441 403">
                    <rect id="button-4" class="svg-trigger-black" x="110" y="50" width="45" height="15" rx="4"/>
                    <rect id="button-6" class="svg-trigger-black" x="115" y="10" width="35" height="30" rx="4"/>
                    <rect id="button-5" class="svg-trigger-black" x="286" y="50" width="45" height="15" rx="4"/>
                    <rect id="button-7" class="svg-trigger-black" x="291" y="10" width="35" height="30" rx="4"/>

                    <path class="svg-body" d="M220.5 92C200.5 92 154 92 128 92C95.5 92 66.5 109.5 55 137.5C43.5 165.5 4 271.1 4 317.5C4 363.9 17.5 378.5 49.5 378.5C81.5 378.5 105 294.5 150 294.5C195 294.5 220.5 294.5 220.5 294.5C220.5 294.5 245.5 294.5 290.5 294.5C335.5 294.5 359 378.5 391 378.5C423 378.5 436.5 363.9 436.5 317.5C436.5 271.1 397 165.5 385.5 137.5C374 109.5 345 92 312.5 92C286.5 92 240 92 220.5 92Z" />

                    <g id="dpad-group" transform="translate(100, 210)">
                        <path id="button-12" class="svg-btn" d="M10 0h10v10H10z" />
                        <path id="button-13" class="svg-btn" d="M10 20h10v10H10z" />
                        <path id="button-14" class="svg-btn" d="M0 10h10v10H0z" />
                        <path id="button-15" class="svg-btn" d="M20 10h10v10H20z" />
                    </g>
                    
                    <circle id="button-0" class="svg-btn" cx="329" cy="198" r="15"/>
                    <circle id="button-1" class="svg-btn" cx="365" cy="160" r="15"/>
                    <circle id="button-2" class="svg-btn" cx="293" cy="160" r="15"/>
                    <circle id="button-3" class="svg-btn" cx="329" cy="122" r="15"/>

                    <circle id="stick-l" class="svg-stick" cx="113" cy="160" r="30"/>
                    <circle id="stick-r" class="svg-stick" cx="278" cy="238" r="30"/>
                    <circle id="button-10" class="svg-btn" cx="113" cy="160" r="12"/>
                    <circle id="button-11" class="svg-btn" cx="278" cy="238" r="12"/>

                    <circle id="button-8" class="svg-btn" cx="205" cy="162" r="7"/>
                    <circle id="button-9" class="svg-btn" cx="235" cy="162" r="7"/>
                    <circle id="button-16" class="svg-btn" cx="220" cy="182" r="10"/>
                </svg>
            </div>

            <div class="actions-row">
                <button class="btn-action" onclick="vibrate(400)">Vibrar</button>
                <div class="toggle-container">
                    <span>Vibración Continua</span>
                    <label class="switch">
                        <input type="checkbox" onchange="toggleInfinite(this)">
                        <span class="slider"></span>
                    </label>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const canvas = document.getElementById('tablero-fondo');
        const ctx = canvas.getContext('2d');

        let offsetX = 0;
        const speed = 1.5; 
        const size = 60;   

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            ctx.strokeStyle = 'rgba(132, 95, 244, 0.18)';
            ctx.lineWidth = 2;

            const horizon = canvas.height * 0.4; 
            const movement = offsetX % size;

            const totalLinesX = Math.ceil(canvas.width / size) + 20;
            for (let i = -10; i < totalLinesX; i++) {
                const xOnHorizon = (i * size) - movement;
                const xOnBottom = ((i - totalLinesX / 2) * size * 4) + (canvas.width / 2) - (movement * 4);
                
                ctx.beginPath();
                ctx.moveTo(xOnHorizon, horizon);
                ctx.lineTo(xOnBottom, canvas.height);
                ctx.stroke();
            }

            const totalLinesY = 20;
            for (let i = 0; i < totalLinesY; i++) {
                const ratio = i / totalLinesY;
                const y = horizon + (canvas.height - horizon) * Math.pow(ratio, 2.5);
                
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(canvas.width, y);
                ctx.stroke();
            }

            offsetX = (offsetX + speed) % (size * 100);

            requestAnimationFrame(draw);
        }

        draw();

    const btnGrid = document.getElementById('btn-grid');
    let infiniteInterval = null;

    for(let i=0; i<17; i++) {
        btnGrid.innerHTML += `<div id="label-b${i}" class="btn-stat">B${i}: 0.00</div>`;
    }

    function toggleInfinite(cb) {
        if(cb.checked) {
            infiniteInterval = setInterval(() => vibrate(1000), 500);
        } else {
            clearInterval(infiniteInterval);
            navigator.getGamepads()[0]?.vibrationActuator?.reset();
        }
    }

    function vibrate(ms) {
        navigator.getGamepads()[0]?.vibrationActuator?.playEffect("dual-rumble", { duration: ms, strongMagnitude: 1.0 });
    }

    function update() {
        const gp = navigator.getGamepads()[0];
        if (gp) {
            document.getElementById('main-tester').style.display = 'grid';
            document.getElementById('msg-init').style.display = 'none';
            document.getElementById('gp-name').innerText = gp.id.split('(')[0];

            gp.buttons.forEach((btn, i) => {
                const label = document.getElementById(`label-b${i}`);
                const svgBtn = document.getElementById(`button-${i}`);
                
                if(label) {
                    label.innerText = `B${i}: ${btn.value.toFixed(2)}`;
                    btn.pressed ? label.classList.add('active') : label.classList.remove('active');
                }

                if(svgBtn) {
                    svgBtn.style.fill = btn.pressed ? "#A163E1" : (svgBtn.classList.contains('svg-trigger-black') ? "#000" : "transparent");
                }
            });

            document.getElementById('stick-l').setAttribute('transform', `translate(${gp.axes[0]*15}, ${gp.axes[1]*15})`);
            document.getElementById('stick-r').setAttribute('transform', `translate(${gp.axes[2]*15}, ${gp.axes[3]*15})`);
            document.getElementById('axes-txt').innerText = gp.axes.map(a => a.toFixed(2)).join(', ');
        }
        requestAnimationFrame(update);
    }

    window.addEventListener("gamepadconnected", update);
</script>
</body>
</html>

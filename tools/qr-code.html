<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>爱 › Generador QR</title>
    <link rel="icon" href="../assets/katana.png">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="../css/tools-style.css">
</head>
<style>
/*=== GENERADOR QR ===*/
    
.qr-wrapper {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    width: 100%;
}

.input-group {
    margin: 20px 0;
    width: 100%;
    max-width: 440px;
}

input {
    width: 100%;
    padding: 14px;
    border-radius: 12px;
    border: 1px solid rgba(132, 95, 244, 0.8);
    background: rgba(0, 0, 0, 0.4);
    color: white;
    font-family: 'Source Code Pro', monospace;
    outline: none;
    transition: all 0.2s ease;
}

input:focus {
    border-color: rgba(132, 95, 244, 0.8);
    box-shadow: 0 0 10px rgba(132, 95, 244, 0.15);
}

#qrcode {
    margin-top: 15px;
    padding: 12px;
    background: white;
    border-radius: 12px;
    display: none;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
}

@media (max-width: 768px) {

    /*testear 
    .btn.primary {
    position: absolute;
    top: 40px;
    right: 40px;
    border: 1px solid rgba(132, 95, 244, .45);
    background: linear-gradient(180deg, rgba(132, 95, 244, .22), rgba(132, 95, 244, .08));
    color: #eaeaea;
    padding: 8px 16px;

    text-decoration: none;
    display: flex;

    gap: 6px;
    cursor: pointer;
    transition: all 0.2s ease;
    z-index: 10;
    }*/
    
    input {
        padding: 10px;
        font-size: 12px;
    }
}
</style>
<body>
    <canvas id="tablero-fondo"></canvas>

    <main class="cuadro-central">
        <header class="cabecera-principal">
            <h1>> Generador QR</h1>
            <a href="../tools/tools.html" class="btn primary"><i class="bi bi-arrow-left"></i> Volver</a>
        </header>

        <div class="qr-wrapper">
                        
            <div class="input-group">
                <input type="text" id="text-input" placeholder="Pega tu texto o URL aquí..." oninput="generateQR()">
            </div>

            <div id="qrcode"></div>
        </div>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script>
        const canvas = document.getElementById('tablero-fondo');
        const ctx = canvas.getContext('2d');

        let offsetX = 0;
        const speed = 1.5; 
        const size = 60;   

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            ctx.strokeStyle = 'rgba(132, 95, 244, 0.18)';
            ctx.lineWidth = 2;

            const horizon = canvas.height * 0.4; 
            const movement = offsetX % size;

            const totalLinesX = Math.ceil(canvas.width / size) + 20;
            for (let i = -10; i < totalLinesX; i++) {
                const xOnHorizon = (i * size) - movement;
                const xOnBottom = ((i - totalLinesX / 2) * size * 4) + (canvas.width / 2) - (movement * 4);
                
                ctx.beginPath();
                ctx.moveTo(xOnHorizon, horizon);
                ctx.lineTo(xOnBottom, canvas.height);
                ctx.stroke();
            }

            const totalLinesY = 20;
            for (let i = 0; i < totalLinesY; i++) {
                const ratio = i / totalLinesY;
                const y = horizon + (canvas.height - horizon) * Math.pow(ratio, 2.5);
                
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(canvas.width, y);
                ctx.stroke();
            }

            offsetX = (offsetX + speed) % (size * 100);

            requestAnimationFrame(draw);
        }

        draw();

        const qrContainer = document.getElementById("qrcode");
        const input = document.getElementById("text-input");
                
        const qrCode = new QRCode(qrContainer, {
            width: 200,
            height: 200,
            colorDark: "#000000",
            colorLight: "#ffffff",
            correctLevel: QRCode.CorrectLevel.H
        });

        function generateQR() {
            const value = input.value.trim();
                        
            if (value) {
                qrCode.clear();
                qrCode.makeCode(value);
                qrContainer.style.display = "block";
            } else {
                qrContainer.style.display = "none";
            }
        }
    </script>
</body>
</html>

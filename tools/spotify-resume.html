<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>爱 › Spotify Resume</title>
    <link rel="icon" href="../assets/katana.png">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="../css/tools-style.css">
</head>
<style>
/*=== SPOTIFY RESUME ===*/
/* ARREGLAR BOTON DE VOLVER*/
.spotify-layout .header-section h1 { 
    font-size: 1.4rem; 
    margin-bottom: 10px; 
}

.privacy-notice {
    background: rgba(132, 95, 244, 0.1);
    border: 1px solid rgba(132, 95, 244, 0.75);
    padding: 10px;
    border-radius: 10px;
    font-size: 0.7rem;
    color: rgba(132, 95, 244, 0.75);
    margin-bottom: 15px;
}

.user-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 15px;
    padding-bottom: 10px;
    border-bottom: 1px solid rgba(132, 95, 244, 0.2);
}

#user-name { 
    color: #fff; 
    font-size: 1.1rem; 
}

.btn-share {
    background: rgba(132, 95, 244, 0.75);
    color: #fff;
    border: none;
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 0.7rem;
    cursor: pointer;
}

.btn-spotify {
    background: rgba(132, 95, 244, 0.75);
    color: #fff;
    border: none;
    padding: 12px 25px;
    border-radius: 50px;
    font-weight: bold;
    cursor: pointer;
}

.total-plays {
    background: rgba(132, 95, 244, 0.15);
    padding: 15px;
    border-radius: 15px;
    margin-bottom: 15px;
    text-align: center;
}

.total-plays span { 
    color: rgba(132, 95, 244, 0.75); 
    font-size: 1.8rem; 
    font-weight: bold; 
}

.section-title { 
    font-size: 0.85rem; 
    margin-bottom: 12px; 
    border-bottom: 1px solid rgba(132, 95, 244, 0.75); 
    display: inline-block; 
}

.genres-grid { 
    display: flex; 
    flex-wrap: wrap; 
    gap: 6px; 
    margin-bottom: 20px; 
}

.genre-tag {
    border: 1px solid rgba(132, 95, 244, 0.75);
    border-radius: 20px;
    padding: 4px 10px;
    font-size: 0.65rem;
    color: #fff;
    text-transform: capitalize;
}

.artists-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
}

.artist-card { 
    text-align: center; 
    background: rgba(0,0,0,0.2); 
    padding: 10px; 
    border-radius: 12px; 
}

.artist-img {
    width: 55px; 
    height: 55px;
    border-radius: 50%;
    margin: 0 auto 8px;
    background-size: cover;
    border: 2px solid rgba(132, 95, 244, 0.75);
}

.artist-name { 
    font-size: 0.6rem; 
    color: #fff; 
    white-space: nowrap; 
    overflow: hidden; 
    text-overflow: ellipsis; 
}

.btn-home { 
    color: rgba(132, 95, 244, 0.75); 
    text-decoration: none; 
    font-size: 0.8rem; 
    margin-top: 25px; 
    display: block; 
}

.overlay {
    position: fixed; 
    top: 0; 
    left: 0; 
    width: 100%; 
    height: 100%;
    background: rgba(0,0,0,0.9); 
    z-index: 100;
    display: flex; 
    justify-content: center; 
    align-items: center;
}

.story-card {
    background: linear-gradient(135deg, #000, #222);
    width: 280px; 
    padding: 40px 20px; 
    border-radius: 20px;
    border: 1px solid rgba(132, 95, 244, 0.75); 
    position: relative;
}

.close-btn { 
    position: absolute; 
    top: 10px; 
    right: 15px; 
    background: none; 
    border: none; 
    color: #fff; 
    font-size: 1.2rem; 
}

@media (max-width: 600px) {
    .resume-layout { 
        display: flex; 
        flex-direction: column; 
    }
    .artists-grid { 
        grid-template-columns: repeat(3, 1fr); 
        gap: 8px; 
    }
}
</style>
<body>
    <canvas id="tablero-fondo"></canvas>

    <div class="cuadro-central">
        <div class="spotify-container">
            <div class="header-section">
                <header class="cabecera-principal">
                    <h1><i class="bi bi-spotify"></i> Spotify Resume</h1>
                    <a href="../tools/tools.html" class="btn primary"><i class="bi bi-arrow-left"></i> Volver</a>
                </header>
            </div>
            
            <div class="privacy-notice" id="privacy-box">
                <i class="bi bi-shield-check"></i>
                <span>🔒 Datos locales. No compartimos tu información.</span>
            </div>
            
            <button id="spotify-login-btn" class="btn-spotify">
                <i class="bi bi-spotify"></i> Conectar con Spotify
            </button>

            <div id="stats-container" class="stats-container" style="display: none;">
                <div class="user-header">
                    <h3 id="user-name">--</h3>
                    <button id="share-btn" class="btn-share">
                        <i class="bi bi-camera"></i> Compartir
                    </button>
                </div>

                <div class="resume-layout">
                    <div class="left-panel">
                        <div class="total-plays">
                            <h3>🎵 Reproducciones</h3>
                            <span id="total-plays-count">--</span>
                        </div>

                        <div class="genres-section">
                            <h3 class="section-title"><i class="bi bi-music-note-beamed"></i> Géneros</h3>
                            <div id="genres-container" class="genres-grid"></div>
                        </div>
                    </div>

                    <div class="right-panel">
                        <h3 class="section-title"><i class="bi bi-star-fill"></i> Top 15 Artistas</h3>
                        <div id="artists-container" class="artists-grid"></div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <div id="story-overlay" class="overlay" style="display: none;">
        <div id="story-content" class="story-card">
            <button onclick="closeStory()" class="close-btn">✕</button>
            <div id="story-inner"></div>
            <button id="download-story-btn" class="btn-spotify" style="background: #A163E1; margin-top: 20px;">Descargar</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('tablero-fondo');
    const ctx = canvas.getContext('2d');
    
    let offsetX = 0;
    const speed = 1.5; 
    const size = 60;   
    
    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();
    
    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        ctx.strokeStyle = 'rgba(132, 95, 244, 0.18)';
        ctx.lineWidth = 2;
    
        const horizon = canvas.height * 0.4; 
        const movement = offsetX % size;
    
        const totalLinesX = Math.ceil(canvas.width / size) + 20;
        for (let i = -10; i < totalLinesX; i++) {
            const xOnHorizon = (i * size) - movement;
            const xOnBottom = ((i - totalLinesX / 2) * size * 4) + (canvas.width / 2) - (movement * 4);
            
            ctx.beginPath();
            ctx.moveTo(xOnHorizon, horizon);
            ctx.lineTo(xOnBottom, canvas.height);
            ctx.stroke();
        }
    
        const totalLinesY = 20;
        for (let i = 0; i < totalLinesY; i++) {
            const ratio = i / totalLinesY;
            const y = horizon + (canvas.height - horizon) * Math.pow(ratio, 2.5);
            
            ctx.beginPath();
            ctx.moveTo(0, y);
            ctx.lineTo(canvas.width, y);
            ctx.stroke();
        }
    
        offsetX = (offsetX + speed) % (size * 100);
    
        requestAnimationFrame(draw);
    }
    draw();
    </script>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <script>
        const CLIENT_ID = '781d3df113e1428686584aa68aacc136';
        const REDIRECT_URI = window.location.href.split('?')[0].split('#')[0];
        const SCOPES = 'user-top-read user-read-recently-played user-read-private';
        
        let accessToken = null;
        let userProfile = null;

        const loginBtn = document.getElementById('spotify-login-btn');
        const shareBtn = document.getElementById('share-btn');
        const statsContainer = document.getElementById('stats-container');
        const privacyBox = document.getElementById('privacy-box');
        const genresContainer = document.getElementById('genres-container');
        const artistsContainer = document.getElementById('artists-container');
        const totalPlaysSpan = document.getElementById('total-plays-count');
        const userNameSpan = document.getElementById('user-name');

        async function loginWithSpotify() {
            const verifier = Array.from(crypto.getRandomValues(new Uint8Array(64))).map(b => b.toString(16).padStart(2, '0')).join('');
            localStorage.setItem('code_verifier', verifier);
            const digest = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(verifier));
            const challenge = btoa(String.fromCharCode(...new Uint8Array(digest))).replace(/=/g, '').replace(/\+/g, '-').replace(/\//g, '_');
            
            const url = new URL('https://accounts.spotify.com/authorize');
            url.searchParams.append('client_id', CLIENT_ID);
            url.searchParams.append('response_type', 'code');
            url.searchParams.append('redirect_uri', REDIRECT_URI);
            url.searchParams.append('scope', SCOPES);
            url.searchParams.append('code_challenge_method', 'S256');
            url.searchParams.append('code_challenge', challenge);
            window.location.href = url.toString();
        }

        async function handleRedirect() {
            const code = new URLSearchParams(window.location.search).get('code');
            if (code) {
                const verifier = localStorage.getItem('code_verifier');
                const response = await fetch('https://accounts.spotify.com/api/token', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: new URLSearchParams({ client_id: CLIENT_ID, grant_type: 'authorization_code', code, redirect_uri: REDIRECT_URI, code_verifier: verifier })
                });
                const data = await response.json();
                if (data.access_token) {
                    localStorage.setItem('spotify_token', data.access_token);
                    window.history.pushState({}, document.title, REDIRECT_URI);
                    location.reload();
                }
            } else {
                accessToken = localStorage.getItem('spotify_token');
                if (accessToken) fetchUserData();
            }
        }

        async function fetchUserData() {
            try {
                const headers = { 'Authorization': `Bearer ${accessToken}` };
                const [p, a, t, r] = await Promise.all([
                    fetch('https://api.spotify.com/v1/me', { headers }),
                    fetch('https://api.spotify.com/v1/me/top/artists?limit=20', { headers }),
                    fetch('https://api.spotify.com/v1/me/top/tracks?limit=1', { headers }),
                    fetch('https://api.spotify.com/v1/me/player/recently-played?limit=50', { headers })
                ]);

                if (p.status === 401) throw new Error();

                userProfile = await p.json();
                const artists = await a.json();
                const tracks = await t.json();
                const recent = await r.json();

                userNameSpan.textContent = userProfile.display_name;
                totalPlaysSpan.textContent = ((recent.items?.length || 0) + (tracks.total || 0)).toLocaleString();

                loginBtn.style.display = 'none';
                privacyBox.style.display = 'none';
                statsContainer.style.display = 'block';

                artistsContainer.innerHTML = (artists.items || []).slice(0, 15).map(art => `
                    <div class="artist-card">
                        <div class="artist-img" style="background-image: url('${art.images[0]?.url}')"></div>
                        <div class="artist-name">${art.name}</div>
                    </div>`).join('');

                const genreMap = new Map();
                artists.items?.forEach(art => art.genres?.forEach(g => genreMap.set(g, (genreMap.get(g) || 0) + 1)));
                const topGenres = Array.from(genreMap.entries()).sort((a,b) => b[1]-a[1]).slice(0, 10).map(g => g[0]);
                genresContainer.innerHTML = topGenres.map(g => `<span class="genre-tag">${g}</span>`).join('');

            } catch (e) {
                localStorage.removeItem('spotify_token');
                loginBtn.style.display = 'block';
            }
        }

        function closeStory() { document.getElementById('story-overlay').style.display = 'none'; }
        
        shareBtn.onclick = () => {
            const genres = Array.from(document.querySelectorAll('.genre-tag')).map(t => t.textContent).slice(0, 6);
            document.getElementById('story-inner').innerHTML = `
                <h2 style="color:white; margin-bottom:15px;">${userProfile.display_name}</h2>
                <div style="background:rgba(161,99,225,0.2); padding:15px; border-radius:15px; margin-bottom:15px;">
                    <span style="color:#1DB954; font-size:1.8rem; font-weight:bold;">${totalPlaysSpan.textContent}</span>
                    <p style="color:white; font-size:0.8rem; margin:0;">Reproducciones</p>
                </div>
                <div style="display:flex; flex-wrap:wrap; justify-content:center; gap:5px;">
                    ${genres.map(g => `<span style="border:1px solid #A163E1; border-radius:20px; padding:3px 8px; color:white; font-size:0.6rem;">${g}</span>`).join('')}
                </div>`;
            document.getElementById('story-overlay').style.display = 'flex';
        };

        document.getElementById('download-story-btn').onclick = async () => {
            const canvas = await html2canvas(document.getElementById('story-content'), { backgroundColor: '#1a1a2e', scale: 2 });
            const link = document.createElement('a');
            link.download = 'spotify-resume.png';
            link.href = canvas.toDataURL();
            link.click();
        };

        loginBtn.onclick = loginWithSpotify;
        handleRedirect();
    </script>
</body>
</html>

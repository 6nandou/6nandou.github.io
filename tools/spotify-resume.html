<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>爱 › Spotify Resume</title>
    <link rel="icon" href="../assets/katana.png">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="spotify-style.css">
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
</head>
<body>
    <div class="cuadro-central">
        <div class="spotify-container">
            <div style="text-align: center; width: 100%;">
                <h1><i class="bi bi-spotify"></i> Spotify Resume</h1>
            </div>
            
            <div style="display: flex; justify-content: flex-end; width: 100%; margin-top: -45px; margin-bottom: 5px;">
                <button id="share-btn" class="btn-spotify" style="background: #A163E1; padding: 8px 18px; font-size: 0.8rem; display: none;">
                    <i class="bi bi-camera"></i> Compartir
                </button>
            </div>
            
            <div class="privacy-notice">
                <i class="bi bi-shield-check"></i>
                <span>🔒 Tus datos se guardan localmente en tu navegador para mantener la sesión activa. No los compartimos ni los usamos de forma maliciosa.</span>
            </div>
            
            <button id="spotify-login-btn" class="btn-spotify">
                <i class="bi bi-spotify"></i> Conectar con Spotify
            </button>

            <div id="stats-container" class="stats-container" style="display: none;">
                <div class="resume-layout">
                    <div class="left-panel">
                        <div id="user-info" style="text-align: center; margin-bottom: 15px;">
                            <h3 id="user-name" style="margin: 0; color: white; font-size: 1rem;">--</h3>
                            <p id="user-time" style="margin: 5px 0 0; font-size: 0.7rem;">Tiempo escuchado: calculando...</p>
                        </div>

                        <div class="total-plays" id="total-plays-container">
                            <h3>🎵 Reproducciones Totales</h3>
                            <span id="total-plays-count">--</span>
                        </div>

                        <div class="genres-section">
                            <h3 class="section-title"><i class="bi bi-music-note-beamed"></i> Géneros Más Escuchados</h3>
                            <div id="genres-container" class="genres-grid"></div>
                        </div>
                    </div>

                    <div class="right-panel">
                        <h3 class="section-title"><i class="bi bi-star-fill"></i> Top 15 Artistas</h3>
                        <div id="artists-container" class="artists-grid"></div>
                    </div>
                </div>
            </div>

            <a href="../tools.html" class="btn-home">
                <i class="bi bi-arrow-left"></i> Volver a herramientas
            </a>
        </div>
    </div>

    <div id="story-overlay" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 9999; justify-content: center; align-items: center;">
        <div id="story-content" style="background: linear-gradient(135deg, #1a1a2e, #4a4a6a); width: 360px; border-radius: 30px; padding: 30px 20px; text-align: center; position: relative;">
            <button onclick="closeStory()" style="position: absolute; top: 10px; right: 15px; background: none; border: none; color: white; font-size: 24px; cursor: pointer;">✕</button>
            <div id="story-inner"></div>
            <button id="download-story-btn" class="btn-spotify" style="margin-top: 20px; background: #A163E1;">Descargar imagen</button>
        </div>
    </div>

    <script>
        const CLIENT_ID = '781d3df113e1428686584aa68aacc136';
        const REDIRECT_URI = window.location.href.split('?')[0].split('#')[0];
        const SCOPES = 'user-top-read user-read-recently-played user-read-private';
        
        let accessToken = null;
        let topArtistsData = [];
        let userProfile = null;

        const loginBtn = document.getElementById('spotify-login-btn');
        const shareBtn = document.getElementById('share-btn');
        const statsContainer = document.getElementById('stats-container');
        const genresContainer = document.getElementById('genres-container');
        const artistsContainer = document.getElementById('artists-container');
        const totalPlaysSpan = document.getElementById('total-plays-count');
        const userNameSpan = document.getElementById('user-name');
        const userTimeP = document.getElementById('user-time');

        function generateRandomString(length) {
            const possible = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
            const values = crypto.getRandomValues(new Uint8Array(length));
            return values.reduce((acc, x) => acc + possible[x % possible.length], "");
        }

        async function generateCodeChallenge(codeVerifier) {
            const encoder = new TextEncoder();
            const data = encoder.encode(codeVerifier);
            const digest = await crypto.subtle.digest('SHA-256', data);
            return btoa(String.fromCharCode(...new Uint8Array(digest)))
                .replace(/=/g, '')
                .replace(/\+/g, '-')
                .replace(/\//g, '_');
        }

        async function loginWithSpotify() {
            const codeVerifier = generateRandomString(128);
            localStorage.setItem('code_verifier', codeVerifier);
            
            const codeChallenge = await generateCodeChallenge(codeVerifier);
            
            const authUrl = new URL('https://accounts.spotify.com/authorize');
            authUrl.searchParams.append('client_id', CLIENT_ID);
            authUrl.searchParams.append('response_type', 'code');
            authUrl.searchParams.append('redirect_uri', REDIRECT_URI);
            authUrl.searchParams.append('scope', SCOPES);
            authUrl.searchParams.append('code_challenge_method', 'S256');
            authUrl.searchParams.append('code_challenge', codeChallenge);
            
            window.location.href = authUrl.toString();
        }

        async function exchangeCodeForToken(code) {
            const codeVerifier = localStorage.getItem('code_verifier');
            
            const response = await fetch('https://accounts.spotify.com/api/token', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded',
                },
                body: new URLSearchParams({
                    client_id: CLIENT_ID,
                    grant_type: 'authorization_code',
                    code: code,
                    redirect_uri: REDIRECT_URI,
                    code_verifier: codeVerifier,
                })
            });
            
            const data = await response.json();
            if (data.access_token) {
                accessToken = data.access_token;
                localStorage.setItem('spotify_token', accessToken);
                return true;
            }
            return false;
        }

        async function handleRedirect() {
            const urlParams = new URLSearchParams(window.location.search);
            const code = urlParams.get('code');
            
            if (code) {
                const success = await exchangeCodeForToken(code);
                if (success) {
                    window.history.pushState({}, document.title, REDIRECT_URI);
                    await fetchUserData();
                    loginBtn.style.display = 'none';
                    shareBtn.style.display = 'flex';
                    statsContainer.style.display = 'block';
                }
            } else {
                const savedToken = localStorage.getItem('spotify_token');
                if (savedToken) {
                    accessToken = savedToken;
                    await fetchUserData();
                    loginBtn.style.display = 'none';
                    shareBtn.style.display = 'flex';
                    statsContainer.style.display = 'block';
                } else {
                    loginBtn.style.display = 'flex';
                }
            }
        }

        async function fetchUserData() {
            if (!accessToken) return;
            
            try {
                const profileResponse = await fetch('https://api.spotify.com/v1/me', {
                    headers: { 'Authorization': `Bearer ${accessToken}` }
                });
                userProfile = await profileResponse.json();
                userNameSpan.textContent = userProfile.display_name;
                
                const artistsResponse = await fetch('https://api.spotify.com/v1/me/top/artists?limit=15&time_range=long_term', {
                    headers: { 'Authorization': `Bearer ${accessToken}` }
                });

                if (!artistsResponse.ok) {
                    if (artistsResponse.status === 401) {
                        localStorage.removeItem('spotify_token');
                        loginBtn.style.display = 'flex';
                        shareBtn.style.display = 'none';
                        statsContainer.style.display = 'none';
                    }
                    throw new Error('Error al obtener artistas');
                }
                
                const artistsData = await artistsResponse.json();
                topArtistsData = artistsData.items;
                
                console.log('Artistas obtenidos:', topArtistsData.map(a => ({name: a.name, genres: a.genres})));
                
                const recentResponse = await fetch('https://api.spotify.com/v1/me/player/recently-played?limit=50', {
                    headers: { 'Authorization': `Bearer ${accessToken}` }
                });
                
                let totalPlays = 0;
                if (recentResponse.ok) {
                    const recentData = await recentResponse.json();
                    totalPlays = recentData.items?.length || 0;
                }
                
                const listeningTime = Math.floor((totalPlays * 3.5) / 60);
                userTimeP.textContent = `Tiempo escuchado: ~${listeningTime} horas`;
                
                displayArtists(topArtistsData);
                
                const genres = extractGenres(topArtistsData);
                console.log('Géneros extraídos:', genres);
                displayGenres(genres);
                
                displayTotalPlays(totalPlays);
                
            } catch (error) {
                console.error('Error:', error);
                statsContainer.innerHTML = `<div class="error-message"><i class="bi bi-exclamation-triangle"></i> Error al cargar datos. Reconecta.</div>`;
                loginBtn.style.display = 'flex';
                shareBtn.style.display = 'none';
                statsContainer.style.display = 'none';
                localStorage.removeItem('spotify_token');
            }
        }

        function extractGenres(artists) {
            const genreMap = new Map();
            
            artists.forEach(artist => {
                if (artist.genres && artist.genres.length > 0) {
                    artist.genres.forEach(genre => {
                        genreMap.set(genre, (genreMap.get(genre) || 0) + 1);
                    });
                }
            });
            
            const sortedGenres = Array.from(genreMap.entries())
                .sort((a, b) => b[1] - a[1])
                .slice(0, 15);
            
            return sortedGenres.map(([genre]) => genre);
        }

        function displayGenres(genres) {
            if (genres.length > 0) {
                genresContainer.innerHTML = genres.map(genre => `<span class="genre-tag">${genre}</span>`).join('');
            } else {
                genresContainer.innerHTML = '<p style="color: #A163E1;">No hay datos de géneros disponibles. Algunos artistas no tienen géneros asignados en Spotify.</p>';
            }
        }

        function displayArtists(artists) {
            artistsContainer.innerHTML = artists.map(artist => {
                return `
                    <div class="artist-card">
                        <div class="artist-img" style="background-image: url('${artist.images?.[1]?.url || artist.images?.[2]?.url || ''}');"></div>
                        <div class="artist-name">${artist.name}</div>
                    </div>
                `;
            }).join('');
        }

        function displayTotalPlays(recentCount) {
            const estimatedTotal = recentCount * 50;
            totalPlaysSpan.textContent = estimatedTotal.toLocaleString();
        }

        function generateStoryHTML() {
            const topArtists = topArtistsData.slice(0, 15);
            const topGenres = Array.from(document.querySelectorAll('.genre-tag')).slice(0, 10).map(tag => tag.textContent);
            const totalPlays = totalPlaysSpan.textContent;
            
            return `
                <div style="text-align: center;">
                    <h2 style="color: white; margin: 0;">${userProfile?.display_name || 'Usuario'}</h2>
                    <p style="color: #A163E1; margin: 5px 0;">${userTimeP.textContent}</p>
                    
                    <div style="background: rgba(161, 99, 225, 0.3); border-radius: 20px; padding: 15px; margin: 20px 0;">
                        <h3 style="color: #1DB954; margin: 0;">🎵 Reproducciones Totales</h3>
                        <p style="color: white; font-size: 2rem; margin: 10px 0;">${totalPlays}</p>
                    </div>
                    
                    <div style="margin: 20px 0;">
                        <h3 style="color: #A163E1;">🎧 Top 15 Artistas</h3>
                        <div style="display: flex; flex-wrap: wrap; justify-content: center; gap: 8px;">
                            ${topArtists.map(artist => `
                                <div style="background: rgba(161, 99, 225, 0.2); border: 1px solid #A163E1; border-radius: 20px; padding: 4px 10px;">
                                    <span style="color: white; font-size: 0.65rem;">${artist.name}</span>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                    
                    <div style="margin: 20px 0;">
                        <h3 style="color: #A163E1;">🎵 Top 10 Géneros</h3>
                        <div style="display: flex; flex-wrap: wrap; justify-content: center; gap: 6px;">
                            ${topGenres.map(genre => `<span style="background: rgba(161, 99, 225, 0.2); border: 1px solid #A163E1; border-radius: 20px; padding: 4px 10px; color: #A163E1; font-size: 0.65rem;">${genre}</span>`).join('')}
                        </div>
                    </div>
                    
                    <div style="margin-top: 25px; padding-top: 15px; border-top: 1px solid #A163E1;">
                        <p style="color: #A163E1; margin: 0;">6nandou.github.io</p>
                    </div>
                </div>
            `;
        }

        async function shareAsStory() {
            const storyInner = document.getElementById('story-inner');
            storyInner.innerHTML = generateStoryHTML();
            document.getElementById('story-overlay').style.display = 'flex';
        }

        async function downloadStory() {
            const storyContent = document.getElementById('story-content');
            const downloadBtn = document.getElementById('download-story-btn');
            downloadBtn.style.display = 'none';
            
            try {
                const canvas = await html2canvas(storyContent, {
                    scale: 2,
                    backgroundColor: null,
                    logging: false
                });
                
                const link = document.createElement('a');
                link.download = 'spotify-resume.png';
                link.href = canvas.toDataURL();
                link.click();
            } catch (error) {
                console.error('Error:', error);
                alert('Error al generar la imagen');
            }
            
            downloadBtn.style.display = 'flex';
        }

        function closeStory() {
            document.getElementById('story-overlay').style.display = 'none';
        }

        loginBtn.addEventListener('click', loginWithSpotify);
        shareBtn.addEventListener('click', shareAsStory);
        
        document.getElementById('download-story-btn').addEventListener('click', downloadStory);
        
        handleRedirect();
    </script>
</body>
</html>
